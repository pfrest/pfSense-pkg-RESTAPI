name: Quality
on: [push]

jobs:
  check_prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Install npm packages
        run: npm install
      - name: Check Prettier
        run: ./node_modules/.bin/prettier --check ./pfSense-pkg-RESTAPI/files

  check_black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1

  lint_php:
    runs-on: ubuntu-latest
    needs: ["check_prettier"]
    strategy:
      matrix:
        PHP_VERSION: ["8.2"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "Setup PHP ${{ matrix.PHP_VERSION }}"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: "${{ matrix.PHP_VERSION }}"
          coverage: "none"
      - name: "Run phplint"
        run: |
          curl -Ls https://github.com/overtrue/phplint/releases/download/9.0.3/phplint.phar -o /usr/local/bin/phplint
          chmod +x /usr/local/bin/phplint
          /usr/local/bin/phplint -vvv --no-cache

  lint_python:
    runs-on: ubuntu-latest
    needs: ["check_black"]
    strategy:
      matrix:
        PYTHON_VERSION: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python ${{ matrix.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pylint
        run: pylint $(git ls-files '*.py')

  check_phpdoc:
    runs-on: ubuntu-latest
    needs: ["lint_php"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check phpdoc build
        run: |
          wget https://phpdoc.org/phpDocumentor.phar -O phpdoc
          chmod +x ./phpdoc
          ./phpdoc
